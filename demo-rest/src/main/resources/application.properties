spring.application.name=demo-rest

logging.level.org.springframework.web=DEBUG
#logging.level.edu.rutmiit.demo=DEBUG
# DB
spring.datasource.url=jdbc:postgresql://localhost:5433/ways
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
#
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.auto-commit=false
# sql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Заставляем использовать example как default
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.api-docs.write-as-default-fields=true
#Принудительно использовать примеры
springdoc.default-flat-param-object=false

# GraphiQL — интерактивная IDE для тестирования GraphQL-запросов.
# Доступна по адресу http://localhost:8080/graphiql после запуска приложения.
spring.graphql.graphiql.enabled=true

#Путь к GraphQL-endpoint
spring.graphql.path=/graphql
# Расположение GraphQL-схемы для Spring for GraphQL.
spring.graphql.schema.locations=classpath*:graphql/

# Расположение GraphQL-схемы для DGS.
# DGS использует свой собственный механизм поиска схемы, отдельный от Spring for GraphQL.
# По умолчанию: classpath*:schema/**/*.graphql* — нужно переопределить.
dgs.graphql.schema-locations=classpath*:graphql/**/*.graphqls

# Включаем интроспекцию схемы (удобно при разработке, отключите в продакшене)
spring.graphql.schema.introspection.enabled=true

# ─── RabbitMQ ────────────────────────────────────────────────────────
# Подключение к локальному брокеру (docker run rabbitmq:4-management)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest