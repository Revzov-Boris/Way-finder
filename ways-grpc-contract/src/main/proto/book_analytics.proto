// Контракт gRPC-сервиса аналитики книг
//
// Определяет сервис BookAnalytics с одним RPC-методом AnalyzeBook.
// Из этого файла protoc + protoc-gen-grpc-java генерируют:
// Классы сообщений - AnalyzeBookRequest, BookAnalysisResponse
// Серверный базовый класс BookAnalyticsGrpc.BookAnalyticsImplBase
// Клиентские стабы BookAnalyticsGrpc.BookAnalyticsBlockingStub

syntax = "proto3";

// Java-пакет для сгенерированных классов
option java_package = "edu.rutmiit.demo.grpc";

// Все сгенерированные классы будут в отдельных файлах (не во вложенных классах)
option java_multiple_files = true;

// Пакет proto (для именования в других .proto файлах при импорте)
package routeanalytics;

// Сервисы
// Unary RPC - один запрос это один ответ (типа аналог REST GET/POST)
service RouteAnalytics {

    // Анализирует книгу и возвращает вычисленные метрики
    rpc AnalyzeRoute (AnalyzeRouteRequest) returns (RouteAnalysisResponse);
}

// Сообщения
// В proto3 все поля опциональны по умолчанию (zero-value = не задано).
// Номера полей (1, 2, 3...) используются в бинарном формате —
// они не должны меняться после релиза
// чтобы не нарушить совместимость

// Запрос на анализ книги — данные, необходимые для вычисления метрик.
message AnalyzeRouteRequest {
    int64  route_id       = 1;  // ID маршрута в системе
    string type_distance  = 2;
    string type_transport = 3;
}

// Ответ с результатами анализа — вычисленные метрики книги.
message RouteAnalysisResponse {
    int64  route_id                = 1;
    double chance_of_cancellation  = 2;
    int32  time_in_way             = 3;
    int32  difficulty_level        = 4;
}
